version: 2

models:
  - name: rpt_peak_demand
    description: "Problem 1: Peak demand hours and days."
    columns:
      - name: trip_date
        description: "The specific date of the trip"
        tests:
          - not_null
      - name: peak_day
        description: "The day of the week (e.g., Monday, Tuesday)"
        tests:
          - not_null
      - name: peak_hour
        description: "The hour of the day the trip started (0-23)"
        tests:
          - not_null
      - name: total_trip_count
        description: "Total number of trips during this day and hour"
        tests:
          - not_null

  - name: rpt_top_areas
    description: "Problem 2: Top community areas by trip volume."
    columns:
      - name: area_key
        description: "Unique identifier for the community area"
        tests:
          - unique
          - not_null
      - name: community_name
        description: "Local name of the Chicago community area"
        tests:
          - not_null
      - name: total_pickups
        description: "Total number of trips originating from this area"
        tests:
          - not_null

  - name: rpt_payment_preferences
    description: "Problem 3: Distribution of payment types."
    columns:
      - name: payment_type
        description: "Method of payment used (e.g., Cash, Credit Card)"
        tests:
          - unique
          - not_null
      - name: trip_count
        description: "Number of trips settled with this payment type"
        tests:
          - not_null

  - name: rpt_company_performance
    description: "Problem 4: Top taxi companies by revenue."
    columns:
      - name: company_name
        description: "Name of the taxi company"
        tests:
          - unique
          - not_null
      - name: total_revenue
        description: "Total trip revenue generated by the company"
        tests:
          - not_null

  - name: rpt_trip_flow
    description: "Problem 5: Analyze trip flow between community areas."
    columns:
      - name: pickup_area
        description: "Name of the community area where the trip started"
        tests:
          - not_null
      - name: dropoff_area
        description: "Name of the community area where the trip ended"
        tests:
          - not_null

  - name: rpt_trip_economics
    description: "Problem 6: Relationship between trip duration, distance, and fare."
    columns:
      - name: trip_distance_category
        description: "Categorical bucket for the trip distance (e.g., 'Short', 'Long')"
        tests:
          - unique
          - not_null
      - name: avg_fare
        description: "Average fare price for trips in this distance category"
        tests:
          - not_null
